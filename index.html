<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Datang Jihan</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #87CEEB;
    --water-top: #29B6F6;
    --water-mid: #0288D1;
    --water-deep: #01579B;
    --abyss: #003060;
    --sand: #F9D976;
    --duck-body: #F4C542;
    --duck-beak: #FF8C00;
    --duck-eye: #1a1a1a;
    --foam: rgba(255,255,255,0.7);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
    background: var(--sky);
  }

  /* ========== LOADING SCREEN ========== */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #C9E8F5 0%, #87CEEB 60%, #B0E0FF 100%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #loading-screen.hide {
    opacity: 0;
    pointer-events: none;
  }

  .loading-text {
    font-family: 'Baloo 2', cursive;
    font-size: 1.3rem;
    color: #0277BD;
    margin-bottom: 24px;
    letter-spacing: 2px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Walking Duck */
  .duck-walk-container {
    position: relative;
    width: 120px;
    height: 80px;
    margin-bottom: 30px;
  }
  .duck-walk {
    position: absolute;
    bottom: 0;
    animation: walk 0.4s steps(1) infinite;
  }

  /* Duck SVG frames via CSS */
  .duck-svg {
    width: 80px;
    animation: duckBob 0.4s ease-in-out infinite alternate;
  }
  @keyframes duckBob {
    from { transform: translateY(0px) rotate(-3deg); }
    to   { transform: translateY(-5px) rotate(3deg); }
  }

  /* Legs */
  .duck-legs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: -6px;
  }
  .leg {
    width: 8px;
    height: 18px;
    background: var(--duck-beak);
    border-radius: 2px;
    transform-origin: top center;
  }
  .leg.left  { animation: legL 0.4s ease-in-out infinite; }
  .leg.right { animation: legR 0.4s ease-in-out infinite; }
  @keyframes legL { 0%,100%{transform:rotate(20deg)} 50%{transform:rotate(-20deg)} }
  @keyframes legR { 0%,100%{transform:rotate(-20deg)} 50%{transform:rotate(20deg)} }

  /* Feet */
  .foot {
    width: 14px;
    height: 6px;
    background: var(--duck-beak);
    border-radius: 3px 6px 6px 3px;
    margin-top: 1px;
  }

  .progress-bar {
    width: 200px;
    height: 10px;
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #FFD54F, #FF8F00);
    border-radius: 10px;
    animation: fillBar 2.5s ease forwards;
  }
  @keyframes fillBar { from{width:0%} to{width:100%} }

  /* Ripple dots */
  .ripples { display: flex; gap: 8px; margin-top: 16px; }
  .rip {
    width: 8px; height: 8px;
    background: #0288D1;
    border-radius: 50%;
    animation: ripJump 0.8s ease-in-out infinite;
  }
  .rip:nth-child(2){animation-delay:0.15s}
  .rip:nth-child(3){animation-delay:0.30s}
  @keyframes ripJump{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

  /* ========== MAIN SCENE ========== */
  #main { display: none; }
  #main.visible { display: block; }

  /* SKY SECTION */
  .sky-section {
    min-height: 100vh;
    background: linear-gradient(180deg, #E0F7FA 0%, #80DEEA 40%, #29B6F6 80%, #039BE5 100%);
    position: relative;
    overflow: hidden;
  }

  /* Clouds */
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
    filter: blur(1px);
  }
  .cloud::before, .cloud::after {
    content:''; position:absolute;
    background: white; border-radius: 50%;
  }
  .c1 { width:120px;height:40px;top:8%;left:5%; animation: cloudDrift 18s linear infinite; }
  .c1::before{width:60px;height:60px;top:-30px;left:15px;}
  .c1::after{width:40px;height:40px;top:-20px;left:55px;}
  .c2 { width:180px;height:50px;top:15%;left:50%; animation: cloudDrift 25s linear infinite 4s; }
  .c2::before{width:80px;height:80px;top:-40px;left:20px;}
  .c2::after{width:60px;height:60px;top:-30px;left:80px;}
  .c3 { width:100px;height:35px;top:5%;left:70%; animation: cloudDrift 20s linear infinite 8s; }
  .c3::before{width:50px;height:50px;top:-25px;left:10px;}
  .c3::after{width:35px;height:35px;top:-18px;left:50px;}
  @keyframes cloudDrift { from{transform:translateX(0)} to{transform:translateX(110vw)} }

  /* Sun */
  .sun {
    position:absolute; top:6%; right:8%;
    width:70px;height:70px;
    background:radial-gradient(circle, #FFEE58, #FFC107);
    border-radius:50%;
    box-shadow:0 0 40px 15px rgba(255,236,64,0.4);
    animation:sunGlow 3s ease-in-out infinite alternate;
  }
  @keyframes sunGlow{from{box-shadow:0 0 40px 15px rgba(255,236,64,0.3)}to{box-shadow:0 0 60px 25px rgba(255,236,64,0.6)}}

  /* Water surface */
  .water-surface {
    position:absolute;
    bottom:0; left:0; right:0;
    height:55%;
  }
  .wave-layer {
    position:absolute;
    width:200%;
    height:100%;
    background:linear-gradient(180deg, rgba(41,182,246,0.9) 0%, rgba(2,136,209,1) 100%);
    border-radius: 50% 50% 0 0 / 20px 20px 0 0;
  }
  .wave1 { animation: wave 6s linear infinite; top:0; }
  .wave2 { animation: wave 8s linear infinite reverse; top:8px; opacity:0.6; }
  @keyframes wave {
    0%{transform:translateX(0)} 100%{transform:translateX(-50%)}
  }

  /* Grass / lily pads hint */
  .lily {
    position:absolute;
    width:60px;height:20px;
    background:#66BB6A;
    border-radius:50%;
    bottom:52%;
  }
  .lily1{left:10%} .lily2{left:35%;width:45px} .lily3{left:60%} .lily4{left:82%;width:50px}

  /* ====== SWIMMING DUCK ====== */
  .duck-swim-wrap {
    position:absolute;
    bottom:50%;
    left: -120px;
    animation: duckSwim 12s linear infinite;
    transform-origin: center bottom;
    z-index:10;
  }
  @keyframes duckSwim {
    0%   {left:-120px}
    100% {left:110%}
  }

  .duck-body-swim {
    position:relative;
    width:90px;
    animation: swimBob 1s ease-in-out infinite alternate;
  }
  @keyframes swimBob {
    from{transform:translateY(0) rotate(-4deg)}
    to  {transform:translateY(-8px) rotate(4deg)}
  }

  /* Water ripple behind duck */
  .swim-ripple {
    position:absolute;
    bottom:-8px; left:5px;
    width:80px;height:14px;
    border-radius:50%;
    background:none;
    border:2px solid rgba(255,255,255,0.5);
    animation: rippleExpand 1s ease-out infinite;
  }
  @keyframes rippleExpand {
    0%{transform:scaleX(1);opacity:0.8}
    100%{transform:scaleX(1.5);opacity:0}
  }

  /* ========== SCROLL HINT ========== */
  .scroll-hint {
    position:absolute;
    bottom:20px; left:50%;
    transform:translateX(-50%);
    color:white;
    text-align:center;
    font-family:'Baloo 2',cursive;
    font-size:0.9rem;
    letter-spacing:1px;
    animation: hintFade 2s ease-in-out infinite;
    z-index:20;
  }
  .scroll-arrow {
    font-size:1.5rem;
    animation: arrowBounce 1.2s ease-in-out infinite;
    display:block;
  }
  @keyframes hintFade{0%,100%{opacity:0.5}50%{opacity:1}}
  @keyframes arrowBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

  /* ========== UNDERWATER SECTION ========== */
  .underwater-section {
    min-height: 100vh;
    background: linear-gradient(180deg,
      #0288D1 0%,
      #01579B 25%,
      #003060 60%,
      #001830 100%
    );
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:60px 20px;
  }

  /* Bubbles */
  .bubble {
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.3);
    animation: bubbleRise linear infinite;
  }
  @keyframes bubbleRise {
    0%  {transform:translateY(0) translateX(0); opacity:0.8}
    50% {transform:translateY(-40vh) translateX(15px); opacity:0.5}
    100%{transform:translateY(-85vh) translateX(-5px); opacity:0}
  }

  /* Light rays */
  .light-ray {
    position:absolute;
    top:0;
    width:60px;
    background:linear-gradient(180deg,rgba(255,255,255,0.12),transparent);
    transform-origin:top center;
    animation: rayFlicker 4s ease-in-out infinite;
  }
  @keyframes rayFlicker{0%,100%{opacity:0.3}50%{opacity:0.7}}

  /* Seaweed */
  .seaweed {
    position:absolute;
    bottom:0;
    width:18px;
    background:linear-gradient(#43A047,#1B5E20);
    border-radius:10px;
    transform-origin:bottom center;
    animation: sway 3s ease-in-out infinite;
  }
  @keyframes sway{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}

  /* Coral */
  .coral {
    position:absolute;
    bottom:0;
    width:0;
    height:0;
  }
  .coral-branch {
    position:absolute;
    bottom:0;
    width:12px;
    background:#EF5350;
    border-radius:6px 6px 0 0;
    transform-origin:bottom center;
  }

  /* ===== FISH ===== */
  .fish {
    position:absolute;
    animation: fishSwim linear infinite;
  }
  @keyframes fishSwim {
    0%  { left: -120px; }
    100%{ left: 110%; }
  }
  .fish-body {
    position:relative;
    display:flex;
    align-items:center;
  }
  .fish-body svg {
    animation: fishWiggle 0.5s ease-in-out infinite alternate;
  }
  @keyframes fishWiggle {
    from{transform:rotate(-5deg)}
    to  {transform:rotate(5deg)}
  }

  /* ===== WELCOME TEXT ===== */
  .welcome-card {
    position:relative;
    z-index:10;
    text-align:center;
    padding:50px 40px;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:30px;
    backdrop-filter:blur(10px);
    max-width:520px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: cardAppear 1s ease-out both;
  }
  @keyframes cardAppear {
    from{opacity:0;transform:translateY(40px) scale(0.9)}
    to  {opacity:1;transform:translateY(0) scale(1)}
  }

  .bubble-deco {
    font-size:3rem;
    margin-bottom:12px;
    animation:iconBounce 2s ease-in-out infinite alternate;
  }
  @keyframes iconBounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}

  .welcome-title {
    font-family:'Baloo 2',cursive;
    font-size:clamp(1.8rem, 5vw, 3rem);
    font-weight:800;
    color:#fff;
    line-height:1.2;
    text-shadow:0 0 30px rgba(100,200,255,0.8);
    margin-bottom:8px;
  }
  .welcome-name {
    font-family:'Baloo 2',cursive;
    font-size:clamp(2.5rem, 7vw, 4.5rem);
    font-weight:800;
    background: linear-gradient(90deg, #FFD54F, #FFAB40, #FF7043, #FFD54F);
    background-size:200%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    animation:nameShine 3s linear infinite;
    display:block;
  }
  @keyframes nameShine{0%{background-position:0%}100%{background-position:200%}}

  .welcome-sub {
    color:rgba(255,255,255,0.7);
    font-size:1rem;
    margin:16px 0 28px;
    line-height:1.6;
  }

  /* CTA Button */
  .btn-start {
    display:inline-block;
    padding:16px 44px;
    font-family:'Baloo 2',cursive;
    font-size:1.15rem;
    font-weight:700;
    color:#003060;
    background:linear-gradient(135deg, #FFD54F 0%, #FFAB40 50%, #FF8F00 100%);
    border:none;
    border-radius:50px;
    cursor:pointer;
    text-decoration:none;
    box-shadow: 0 6px 24px rgba(255,180,0,0.4), 0 2px 6px rgba(0,0,0,0.2);
    transition:transform 0.2s, box-shadow 0.2s;
    animation: btnPulse 2.5s ease-in-out infinite;
    position:relative;
    overflow:hidden;
  }
  .btn-start::before {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.3),transparent);
    border-radius:inherit;
  }
  .btn-start:hover {
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 12px 32px rgba(255,180,0,0.6), 0 4px 10px rgba(0,0,0,0.25);
  }
  .btn-start:active { transform:scale(0.97); }
  @keyframes btnPulse {
    0%,100%{box-shadow:0 6px 24px rgba(255,180,0,0.4), 0 0 0 0 rgba(255,180,0,0)}
    50%    {box-shadow:0 6px 24px rgba(255,180,0,0.4), 0 0 0 12px rgba(255,180,0,0)}
  }

  /* Stars / sparkles */
  .sparkle {
    position:absolute;
    color:#FFD54F;
    font-size:1rem;
    animation:sparkleTwinkle 2s ease-in-out infinite;
  }
  @keyframes sparkleTwinkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}

  /* Sandy bottom */
  .sand-bottom {
    position:absolute;
    bottom:0; left:0; right:0;
    height:80px;
    background:linear-gradient(180deg, #F9D976, #F9A825);
    border-radius:60% 60% 0 0 / 30px 30px 0 0;
  }
  .sand-bottom::after {
    content:'';
    position:absolute;
    top:10px; left:0; right:0;
    height:20px;
    background:rgba(255,255,255,0.1);
    border-radius:inherit;
  }

  /* Transition wave between sky and underwater */
  .section-divider {
    width:100%;
    overflow:hidden;
    line-height:0;
    margin-bottom:-2px;
  }
  .section-divider svg { display:block; width:100%; }
</style>
</head>
<body>

<!-- ============ LOADING SCREEN ============ -->
<div id="loading-screen">
  <!-- Walking Duck -->
  <div class="duck-walk-container">
    <div class="duck-walk">
      <svg class="duck-svg" viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg">
        <!-- Body -->
        <ellipse cx="40" cy="35" rx="28" ry="20" fill="#F4C542"/>
        <!-- Head -->
        <circle cx="62" cy="20" r="14" fill="#F4C542"/>
        <!-- Beak -->
        <ellipse cx="76" cy="22" rx="8" ry="5" fill="#FF8C00"/>
        <!-- Eye -->
        <circle cx="67" cy="16" r="3" fill="#1a1a1a"/>
        <circle cx="68" cy="15" r="1" fill="white"/>
        <!-- Wing -->
        <ellipse cx="38" cy="33" rx="16" ry="10" fill="#E6B020" opacity="0.7"/>
        <!-- Tail feather -->
        <ellipse cx="14" cy="30" rx="8" ry="6" fill="#E6B020" transform="rotate(-20 14 30)"/>
        <!-- Top head feather -->
        <ellipse cx="62" cy="8" rx="4" ry="7" fill="#F4C542" transform="rotate(-15 62 8)"/>
      </svg>
      <div class="duck-legs">
        <div class="leg left"><div class="foot"></div></div>
        <div class="leg right"><div class="foot"></div></div>
      </div>
    </div>
  </div>

  <div class="loading-text">Loading...</div>

  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

  <div class="ripples">
    <div class="rip"></div>
    <div class="rip"></div>
    <div class="rip"></div>
  </div>
</div>

<!-- ============ MAIN SCENE ============ -->
<div id="main">

  <!-- SKY & POND SECTION -->
  <section class="sky-section">
    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>

    <!-- Lily pads -->
    <div class="lily lily1"></div>
    <div class="lily lily2"></div>
    <div class="lily lily3"></div>
    <div class="lily lily4"></div>

    <!-- Water surface -->
    <div class="water-surface">
      <div class="wave-layer wave1"></div>
      <div class="wave-layer wave2"></div>
    </div>

    <!-- Swimming Duck on water -->
    <div class="duck-swim-wrap">
      <div class="swim-ripple"></div>
      <div class="duck-body-swim">
        <svg viewBox="0 0 100 65" xmlns="http://www.w3.org/2000/svg" width="100">
          <!-- Body sitting on water -->
          <ellipse cx="45" cy="42" rx="32" ry="18" fill="#F4C542"/>
          <!-- Water line mask -->
          <rect x="13" y="50" width="64" height="15" fill="#29B6F6"/>
          <!-- Head -->
          <circle cx="73" cy="24" r="16" fill="#F4C542"/>
          <!-- Beak -->
          <ellipse cx="89" cy="27" rx="9" ry="5.5" fill="#FF8C00"/>
          <!-- Eye -->
          <circle cx="79" cy="19" r="3.5" fill="#1a1a1a"/>
          <circle cx="80" cy="18" r="1.2" fill="white"/>
          <!-- Wing detail -->
          <ellipse cx="42" cy="40" rx="18" ry="10" fill="#E6B020" opacity="0.6"/>
          <!-- Tail -->
          <ellipse cx="15" cy="37" rx="9" ry="7" fill="#E6B020" transform="rotate(-25 15 37)"/>
          <!-- Head feather -->
          <ellipse cx="73" cy="9" rx="4" ry="8" fill="#F4C542" transform="rotate(-10 73 9)"/>
        </svg>
      </div>
    </div>

    <!-- Scroll hint -->
    <div class="scroll-hint">
      <span>Scroll ke bawah</span>
      <span class="scroll-arrow">🌊</span>
    </div>
  </section>

  <!-- WAVE DIVIDER -->
  <div class="section-divider">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none">
      <path d="M0,40 C240,80 480,0 720,40 C960,80 1200,0 1440,40 L1440,80 L0,80 Z" fill="#0288D1"/>
    </svg>
  </div>

  <!-- UNDERWATER SECTION -->
  <section class="underwater-section" id="underwater">

    <!-- Light rays -->
    <div class="light-ray" style="left:10%;height:60%;transform:rotate(-8deg)"></div>
    <div class="light-ray" style="left:25%;height:45%;transform:rotate(5deg);animation-delay:1s"></div>
    <div class="light-ray" style="left:55%;height:70%;transform:rotate(-3deg);animation-delay:2s"></div>
    <div class="light-ray" style="left:75%;height:50%;transform:rotate(8deg);animation-delay:0.5s"></div>
    <div class="light-ray" style="left:88%;height:40%;transform:rotate(-6deg);animation-delay:1.5s"></div>

    <!-- Bubbles (generated via JS) -->
    <!-- Seaweeds -->
    <div class="seaweed" style="left:5%;height:90px;animation-delay:0s"></div>
    <div class="seaweed" style="left:7%;height:60px;animation-delay:0.5s;width:12px"></div>
    <div class="seaweed" style="left:15%;height:80px;animation-delay:1s"></div>
    <div class="seaweed" style="left:60%;height:100px;animation-delay:0.3s"></div>
    <div class="seaweed" style="left:63%;height:65px;animation-delay:0.8s;width:12px"></div>
    <div class="seaweed" style="left:80%;height:85px;animation-delay:1.2s"></div>
    <div class="seaweed" style="left:92%;height:75px;animation-delay:0.6s"></div>
    <div class="seaweed" style="right:3%;height:95px;animation-delay:0.2s"></div>

    <!-- Fish 1 - Orange Clownfish -->
    <div class="fish" style="top:20%;animation-duration:10s;animation-delay:0s;">
      <div class="fish-body">
        <svg width="70" height="40" viewBox="0 0 70 40">
          <ellipse cx="35" cy="20" rx="25" ry="15" fill="#FF6F00"/>
          <ellipse cx="35" cy="20" rx="25" ry="15" fill="none" stroke="white" stroke-width="3" stroke-dasharray="10,18"/>
          <polygon points="60,8 75,2 75,38 60,32" fill="#FF6F00"/>
          <circle cx="18" cy="16" r="4" fill="#1a1a1a"/>
          <circle cx="17" cy="15" r="1.5" fill="white"/>
        </svg>
      </div>
    </div>

    <!-- Fish 2 - Blue fish (other direction) -->
    <div class="fish" style="top:45%;animation-duration:14s;animation-delay:3s;transform:scaleX(-1);">
      <div class="fish-body">
        <svg width="60" height="35" viewBox="0 0 60 35">
          <ellipse cx="30" cy="17" rx="20" ry="12" fill="#1565C0"/>
          <ellipse cx="30" cy="17" rx="20" ry="12" fill="none" stroke="#64B5F6" stroke-width="2"/>
          <polygon points="50,6 65,1 65,33 50,29" fill="#1565C0"/>
          <circle cx="15" cy="13" r="3.5" fill="#1a1a1a"/>
          <circle cx="14" cy="12" r="1.2" fill="white"/>
          <!-- Stripes -->
          <line x1="25" y1="6" x2="25" y2="28" stroke="#64B5F6" stroke-width="2" opacity="0.6"/>
          <line x1="35" y1="8" x2="35" y2="26" stroke="#64B5F6" stroke-width="2" opacity="0.4"/>
        </svg>
      </div>
    </div>

    <!-- Fish 3 - Green fish -->
    <div class="fish" style="top:65%;animation-duration:9s;animation-delay:5s;">
      <div class="fish-body">
        <svg width="55" height="30" viewBox="0 0 55 30">
          <ellipse cx="27" cy="15" rx="18" ry="11" fill="#2E7D32"/>

<script>
  // Generate bubbles
  const uw = document.querySelector('.underwater-section');
  for(let i = 0; i < 20; i++){
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = Math.random()*16 + 6;
    b.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      bottom:${Math.random()*20}%;
      animation-duration:${Math.random()*8+5}s;
      animation-delay:${Math.random()*8}s;
    `;
    uw.appendChild(b);
  }

  // Loading → Main
  window.addEventListener('load', ()=>{
    setTimeout(()=>{
      const ls = document.getElementById('loading-screen');
      const main = document.getElementById('main');
      ls.classList.add('hide');
      setTimeout(()=>{
        ls.style.display='none';
        main.classList.add('visible');
      }, 900);
    }, 2700);
  });
</script>
